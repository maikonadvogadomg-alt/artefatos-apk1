name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 34
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: npm install --prefer-offline

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Regenerar Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        timeout-minutes: 30
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
          JAVA_TOOL_OPTIONS: "-Xmx3g"
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -150

      - name: Renomear APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/iara-assistente.apk
          echo "APK_PATH=output/iara-assistente.apk" >> $GITHUB_ENV

      - name: Deletar release anterior (se existir)
        run: |
          gh release delete latest-build --yes 2>/dev/null || true
          git push origin --delete latest-build 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar APK como Release (link público)
        run: |
          gh release create latest-build \
            --title "✅ Iara — APK mais recente" \
            --notes "APK gerado automaticamente. Clique em **iara-assistente.apk** abaixo para baixar." \
            --latest \
            output/iara-assistente.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
